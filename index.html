<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppu Creator — Master Website Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            workspace: {
              bg: '#09090b',
              sidebar: '#141416',
              editor: '#18181b',
              border: '#27272a',
              accent: '#3b82f6'
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .code-font { font-family: 'Fira Code', monospace; }
    .hidden-layer { display: none !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #141416; }
    ::-webkit-scrollbar-thumb { background: #2d2d30; border-radius: 4px; }
  </style>
</head>
<body class="bg-workspace-bg text-zinc-300 antialiased min-h-screen flex flex-col overflow-hidden">

  <div id="loginGate" class="fixed inset-0 z-50 flex items-center justify-center bg-black px-4">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(59,130,246,0.06),transparent_60%)]"></div>
    <div class="w-full max-w-md bg-zinc-900 border border-workspace-border rounded-2xl shadow-2xl p-8 relative z-10">
      <div class="text-center mb-6">
        <h2 class="text-3xl font-black tracking-tight text-white">Suppu Creator<span class="text-workspace-accent">.</span></h2>
        <p class="text-zinc-500 text-xs uppercase tracking-widest font-semibold mt-1">AI Web Generation Matrix</p>
      </div>
      <form id="masterLoginForm" class="space-y-4">
        <div class="space-y-1">
          <label class="text-xs font-medium text-zinc-400">Identity Token Profile</label>
          <input type="text" id="suppuUser" class="w-full bg-zinc-950 border border-workspace-border rounded-xl p-3 text-sm text-white outline-none focus:border-workspace-accent transition-all" placeholder="username" required />
        </div>
        <div class="space-y-1">
          <label class="text-xs font-medium text-zinc-400">Security Access Code</label>
          <input type="password" id="suppuPass" class="w-full bg-zinc-950 border border-workspace-border rounded-xl p-3 text-sm text-white outline-none focus:border-workspace-accent transition-all" placeholder="••••••••" required />
        </div>
        <p id="accessErr" class="text-red-500 text-xs font-medium hidden-layer">❌ Verification credentials rejected.</p>
        <button type="submit" class="w-full bg-workspace-accent hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl text-sm transition-all shadow-lg shadow-blue-500/10">Authorize Terminal</button>
      </form>
    </div>
  </div>

  <div id="masterWorkspace" class="hidden-layer flex-1 flex flex-col h-screen">
    
    <header class="h-14 bg-workspace-sidebar border-b border-workspace-border flex items-center justify-between px-6 shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-2.5 h-2.5 bg-workspace-accent rounded-full animate-pulse"></div>
        <span class="font-black text-xl text-white tracking-tight">Suppu Creator <span class="text-xs font-mono text-zinc-500 font-normal">v3.0-STABLE</span></span>
      </div>
      <div class="flex items-center gap-3">
        <button id="compilePreviewBtn" class="bg-workspace-accent hover:bg-blue-600 text-white px-5 py-1.5 rounded-lg text-xs font-bold transition-all active:scale-95">⚡ Run Blueprint</button>
        <button id="triggerZipExportBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-1.5 rounded-lg text-xs font-bold transition-all active:scale-95">📥 Export Project ZIP</button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      
      <aside class="w-80 bg-workspace-sidebar border-r border-workspace-border flex flex-col shrink-0 overflow-y-auto p-5 space-y-5">
        <div>
          <h3 class="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-3">Generation Specifications</h3>
          <div class="space-y-4 text-xs">
            <div class="space-y-1">
              <label class="text-zinc-400 font-medium">Website/App Title</label>
              <input type="text" id="blueprintName" class="w-full bg-zinc-950 border border-workspace-border rounded-lg p-2.5 text-white outline-none focus:border-workspace-accent" value="SaaSify" />
            </div>
            <div class="space-y-1">
              <label class="text-zinc-400 font-medium">Hero Core Headline</label>
              <input type="text" id="blueprintHeadline" class="w-full bg-zinc-950 border border-workspace-border rounded-lg p-2.5 text-white outline-none focus:border-workspace-accent" value="Supercharge your workflow today." />
            </div>
            <div class="space-y-1">
              <label class="text-zinc-400 font-medium">Visual Accent Color (Hex)</label>
              <input type="text" id="blueprintColor" class="w-full bg-zinc-950 border border-workspace-border rounded-lg p-2.5 text-white outline-none focus:border-workspace-accent" value="#8b5cf6" />
            </div>
            <div class="space-y-1">
              <label class="text-zinc-400 font-medium">Layout Template Archetype</label>
              <select id="blueprintTemplate" class="w-full bg-zinc-950 border border-workspace-border rounded-lg p-2.5 text-white outline-none focus:border-workspace-accent cursor-pointer">
                <option value="saas">Modern SaaS Landing Page</option>
                <option value="portfolio">Minimal Developer Portfolio</option>
                <option value="business">Corporate Showcase Template</option>
              </select>
            </div>
          </div>
        </div>
        
        <button id="generatePayloadBtn" class="w-full bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-white py-3 rounded-xl text-xs font-bold transition-all tracking-wide shadow-md">
          ✨ Re-Compile Source Pipeline
        </button>
      </aside>

      <section class="flex-1 flex flex-col bg-workspace-editor overflow-hidden">
        <div class="h-9 bg-zinc-950 border-b border-workspace-border flex items-center text-xs">
          <button id="tabButtonHTML" class="h-full px-5 border-r border-workspace-border text-workspace-accent font-bold bg-workspace-editor border-t-2 border-t-workspace-accent">index.html</button>
          <button id="tabButtonCSS" class="h-full px-5 border-r border-workspace-border text-zinc-500 font-medium">style.css</button>
          <button id="tabButtonJS" class="h-full px-5 border-r border-workspace-border text-zinc-500 font-medium">script.js</button>
        </div>
        <div class="flex-1 p-3 bg-zinc-9
